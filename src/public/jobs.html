<!doctype html>
<html lang="ja" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOC Streaming - ジョブ管理</title>
  <script src="/ui/runtime-config.js"></script>
  <script src="./bootstrap-css-loader.js"></script>
  <link href="./styles.css" rel="stylesheet" />
</head>
<body data-page="jobs">
  <div class="app-shell">
    <aside class="sidebar d-none d-lg-flex flex-column">
      <div class="sidebar-header px-3 py-3 border-bottom"><span class="fw-semibold">NOC Streaming</span></div>
      <nav class="nav flex-column p-2" id="sidebarNav">
        <a class="nav-link" data-page="jobs" href="/ui/jobs.html"><i class="bi bi-broadcast me-2"></i>ジョブ管理</a>
        <a class="nav-link admin-only" data-page="users" href="/ui/users.html"><i class="bi bi-people me-2"></i>ユーザー管理</a>
        <a class="nav-link admin-only" data-page="ldap" href="/ui/ldap.html"><i class="bi bi-diagram-3 me-2"></i>LDAP設定</a>
        <a class="nav-link admin-only" data-page="audit" href="/ui/audit.html"><i class="bi bi-clipboard-data me-2"></i>監査ログ</a>
      </nav>
    </aside>
    <div class="content-wrap">
      <nav class="navbar navbar-expand-lg border-bottom bg-body sticky-top">
        <div class="container-fluid px-3 px-md-4">
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-secondary d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMobile"><i class="bi bi-list"></i></button>
            <a class="navbar-brand fw-semibold mb-0" href="/ui/jobs.html">NOC Streaming</a>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button id="themeToggle" class="btn btn-outline-secondary btn-sm" title="ダークモード切替"><i class="bi bi-moon-fill"></i></button>
            <span id="userBadge" class="badge text-bg-secondary"></span>
            <button id="logoutBtn" class="btn btn-outline-danger btn-sm">ログアウト</button>
          </div>
        </div>
      </nav>

      <main class="container-fluid px-3 px-md-4 py-3">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <div>
            <h1 class="h4 mb-1">配信ジョブ管理</h1>
            <p class="text-secondary small mb-0">複数表示URLジョブの起動/停止を管理します。</p>
          </div>
          <div class="d-flex gap-2">
            <button id="refreshBtn" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-clockwise"></i> 更新</button>
            <button id="newJobBtn" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle"></i> 新規ジョブ</button>
          </div>
        </div>

        <div id="alertBox" class="alert d-none"></div>

        <div class="card border-0 shadow-sm">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>名前</th>
                  <th>状態</th>
                  <th>解像度/FPS</th>
                  <th>Protocol</th>
                  <th>URL数</th>
                  <th class="text-end">操作</th>
                </tr>
              </thead>
              <tbody id="jobsBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMobile">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">NOC Streaming</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <nav class="nav flex-column" id="sidebarMobileNav">
        <a class="nav-link" data-page="jobs" href="/ui/jobs.html"><i class="bi bi-broadcast me-2"></i>ジョブ管理</a>
        <a class="nav-link admin-only" data-page="users" href="/ui/users.html"><i class="bi bi-people me-2"></i>ユーザー管理</a>
        <a class="nav-link admin-only" data-page="ldap" href="/ui/ldap.html"><i class="bi bi-diagram-3 me-2"></i>LDAP設定</a>
        <a class="nav-link admin-only" data-page="audit" href="/ui/audit.html"><i class="bi bi-clipboard-data me-2"></i>監査ログ</a>
      </nav>
    </div>
  </div>

  <div class="modal fade" id="createJobModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5">ジョブ作成</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="createJobForm">
          <div class="modal-body">
            <ul class="nav nav-tabs mb-3" id="createJobTabs" role="tablist">
              <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#create-tab-basic" type="button" role="tab">基本設定</button></li>
              <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#create-tab-source" type="button" role="tab">ソース</button></li>
              <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#create-tab-advanced" type="button" role="tab">追加設定</button></li>
            </ul>
            <div class="tab-content">
              <div class="tab-pane fade show active" id="create-tab-basic" role="tabpanel">
                <div class="row g-3">
                  <div class="col-md-6"><label class="form-label">名前</label><input name="name" class="form-control" required /></div>
                  <div class="col-md-3"><label class="form-label">幅</label><input name="resolution_width" type="number" class="form-control" value="1920" required /></div>
                  <div class="col-md-3"><label class="form-label">高さ</label><input name="resolution_height" type="number" class="form-control" value="1080" required /></div>
                  <div class="col-md-3"><label class="form-label">FPS</label><input name="fps" type="number" class="form-control" value="5" required /></div>
                  <div class="col-md-3"><label class="form-label">Bitrate(kbps)</label><input name="bitrate_kbps" type="number" class="form-control" value="1200" required /></div>
                  <div class="col-md-3"><label class="form-label">Codec</label><input name="codec" class="form-control" value="libx264" required /></div>
                  <div class="col-md-3"><label class="form-label">Preset</label><input name="preset" class="form-control" value="veryfast" required /></div>
                  <div class="col-md-4"><label class="form-label">Protocol</label><select name="protocol" class="form-select"><option value="rtmp">RTMP</option><option value="srt">SRT</option></select></div>
                  <div class="col-md-8"><label class="form-label">Output URL</label><input name="output_url" class="form-control" placeholder="rtmp://host/live" required /></div>
                  <div class="col-md-6"><label class="form-label">Stream Key (任意)</label><input name="stream_key" class="form-control" /></div>
                </div>
              </div>
              <div class="tab-pane fade" id="create-tab-source" role="tabpanel">
                <div class="row g-3">
                  <div class="col-md-4"><label class="form-label">入力ソース</label><select name="input_source_type" class="form-select"><option value="browser">Browser</option><option value="test_pattern">Test Pattern</option></select></div>
                  <div class="col-md-4"><label class="form-label">テストパターン</label><select name="test_pattern_type" class="form-select"><option value="testsrc2">testsrc2</option><option value="smptebars">smptebars</option><option value="testsrc">testsrc</option><option value="color">color</option></select></div>
                  <div class="col-md-4"><label class="form-label">テストパラメータ</label><input name="test_pattern_params" class="form-control" placeholder="例: duration=0" /></div>
                  <div class="col-md-4"><label class="form-label">画面切替間隔(sec)</label><input name="refresh_interval_sec" type="number" class="form-control" value="30" min="10" required /></div>
                  <div class="col-12">
                    <label class="form-label">表示URL (1行: URL,PRIORITY,URL_REFRESH_SEC / 複数行対応)</label>
                    <textarea name="urls" class="form-control" rows="4">https://example.com,1,1800</textarea>
                    <div class="form-text">URL_REFRESH_SEC=0 を指定すると、そのURLは自動リロードしません。</div>
                  </div>
                </div>
              </div>
              <div class="tab-pane fade" id="create-tab-advanced" role="tabpanel">
                <div class="row g-3">
                  <div class="col-md-4">
                    <div class="form-check mt-4">
                      <input name="overlay_enabled" class="form-check-input" type="checkbox" id="createOverlayEnabled">
                      <label class="form-check-label" for="createOverlayEnabled">時刻+メッセージ表示</label>
                    </div>
                  </div>
                  <div class="col-md-4"><label class="form-label">メッセージ</label><input name="overlay_message" class="form-control" placeholder="NOC" /></div>
                  <div class="col-md-2"><label class="form-label">表示位置</label><select name="overlay_position" class="form-select"><option value="top_left">左上</option><option value="top_right">右上</option><option value="bottom_left">左下</option><option value="bottom_right">右下</option></select></div>
                  <div class="col-md-2"><label class="form-label">文字サイズ(px)</label><input name="overlay_font_size_px" type="number" class="form-control" value="24" min="8" max="200" /></div>
                  <div class="col-md-4"><label class="form-label">Max Retry</label><input name="max_retries" type="number" class="form-control" value="3" required /></div>
                  <div class="col-md-4"><label class="form-label">Retry(sec)</label><input name="retry_interval_sec" type="number" class="form-control" value="10" required /></div>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">閉じる</button>
            <button type="submit" class="btn btn-primary">作成</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="editJobModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5">ジョブ編集</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="editJobForm">
          <input type="hidden" name="job_id" />
          <div class="modal-body">
            <ul class="nav nav-tabs mb-3" id="editJobTabs" role="tablist">
              <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#edit-tab-basic" type="button" role="tab">基本設定</button></li>
              <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#edit-tab-source" type="button" role="tab">ソース</button></li>
              <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#edit-tab-advanced" type="button" role="tab">追加設定</button></li>
            </ul>
            <div class="tab-content">
              <div class="tab-pane fade show active" id="edit-tab-basic" role="tabpanel">
                <div class="row g-3">
                  <div class="col-md-6"><label class="form-label">名前</label><input name="name" class="form-control" required /></div>
                  <div class="col-md-3"><label class="form-label">幅</label><input name="resolution_width" type="number" class="form-control" required /></div>
                  <div class="col-md-3"><label class="form-label">高さ</label><input name="resolution_height" type="number" class="form-control" required /></div>
                  <div class="col-md-3"><label class="form-label">FPS</label><input name="fps" type="number" class="form-control" required /></div>
                  <div class="col-md-3"><label class="form-label">Bitrate(kbps)</label><input name="bitrate_kbps" type="number" class="form-control" required /></div>
                  <div class="col-md-3"><label class="form-label">Codec</label><input name="codec" class="form-control" required /></div>
                  <div class="col-md-3"><label class="form-label">Preset</label><input name="preset" class="form-control" required /></div>
                  <div class="col-md-4"><label class="form-label">Protocol</label><select name="protocol" class="form-select"><option value="rtmp">RTMP</option><option value="srt">SRT</option></select></div>
                  <div class="col-md-8"><label class="form-label">Output URL</label><input name="output_url" class="form-control" required /></div>
                  <div class="col-md-6">
                    <label class="form-label">Stream Key (任意)</label>
                    <input name="stream_key" class="form-control" placeholder="空欄で変更なし" />
                    <div class="form-text">変更する場合のみ入力してください。</div>
                  </div>
                </div>
              </div>
              <div class="tab-pane fade" id="edit-tab-source" role="tabpanel">
                <div class="row g-3">
                  <div class="col-md-4"><label class="form-label">入力ソース</label><select name="input_source_type" class="form-select"><option value="browser">Browser</option><option value="test_pattern">Test Pattern</option></select></div>
                  <div class="col-md-4"><label class="form-label">テストパターン</label><select name="test_pattern_type" class="form-select"><option value="testsrc2">testsrc2</option><option value="smptebars">smptebars</option><option value="testsrc">testsrc</option><option value="color">color</option></select></div>
                  <div class="col-md-4"><label class="form-label">テストパラメータ</label><input name="test_pattern_params" class="form-control" placeholder="例: duration=0" /></div>
                  <div class="col-md-4"><label class="form-label">画面切替間隔(sec)</label><input name="refresh_interval_sec" type="number" class="form-control" min="10" required /></div>
                  <div class="col-12">
                    <label class="form-label">表示URL (1行: URL,PRIORITY,URL_REFRESH_SEC / 複数行対応)</label>
                    <textarea name="urls" class="form-control" rows="4"></textarea>
                    <div class="form-text">URL_REFRESH_SEC=0 を指定すると、そのURLは自動リロードしません。</div>
                  </div>
                </div>
              </div>
              <div class="tab-pane fade" id="edit-tab-advanced" role="tabpanel">
                <div class="row g-3">
                  <div class="col-md-4">
                    <div class="form-check mt-4">
                      <input name="overlay_enabled" class="form-check-input" type="checkbox" id="editOverlayEnabled">
                      <label class="form-check-label" for="editOverlayEnabled">時刻+メッセージ表示</label>
                    </div>
                  </div>
                  <div class="col-md-4"><label class="form-label">メッセージ</label><input name="overlay_message" class="form-control" placeholder="NOC" /></div>
                  <div class="col-md-2"><label class="form-label">表示位置</label><select name="overlay_position" class="form-select"><option value="top_left">左上</option><option value="top_right">右上</option><option value="bottom_left">左下</option><option value="bottom_right">右下</option></select></div>
                  <div class="col-md-2"><label class="form-label">文字サイズ(px)</label><input name="overlay_font_size_px" type="number" class="form-control" value="24" min="8" max="200" /></div>
                  <div class="col-md-4"><label class="form-label">Max Retry</label><input name="max_retries" type="number" class="form-control" required /></div>
                  <div class="col-md-4"><label class="form-label">Retry(sec)</label><input name="retry_interval_sec" type="number" class="form-control" required /></div>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button>
            <button type="submit" class="btn btn-primary">保存して再起動</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="./bootstrap-js-loader.js"></script>
  <script src="./app.js"></script>
</body>
</html>
