<!doctype html>
<html lang="ja" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOC Streaming - 監査ログ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="./styles.css" rel="stylesheet" />
</head>
<body data-page="audit">
  <div class="app-shell">
    <aside class="sidebar d-none d-lg-flex flex-column">
      <div class="sidebar-header px-3 py-3 border-bottom"><span class="fw-semibold">NOC Streaming</span></div>
      <nav class="nav flex-column p-2" id="sidebarNav">
        <a class="nav-link" data-page="jobs" href="/ui/jobs.html"><i class="bi bi-broadcast me-2"></i>ジョブ管理</a>
        <a class="nav-link admin-only" data-page="users" href="/ui/users.html"><i class="bi bi-people me-2"></i>ユーザー管理</a>
        <a class="nav-link admin-only" data-page="ldap" href="/ui/ldap.html"><i class="bi bi-diagram-3 me-2"></i>LDAP設定</a>
        <a class="nav-link admin-only" data-page="audit" href="/ui/audit.html"><i class="bi bi-clipboard-data me-2"></i>監査ログ</a>
      </nav>
    </aside>
    <div class="content-wrap">
      <nav class="navbar navbar-expand-lg border-bottom bg-body sticky-top">
        <div class="container-fluid px-3 px-md-4">
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-secondary d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMobile"><i class="bi bi-list"></i></button>
            <a class="navbar-brand fw-semibold mb-0" href="/ui/jobs.html">NOC Streaming</a>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button id="themeToggle" class="btn btn-outline-secondary btn-sm" title="ダークモード切替"><i class="bi bi-moon-fill"></i></button>
            <span id="userBadge" class="badge text-bg-secondary"></span>
            <button id="logoutBtn" class="btn btn-outline-danger btn-sm">ログアウト</button>
          </div>
        </div>
      </nav>
      <main class="container-fluid px-3 px-md-4 py-3">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <div>
            <h1 class="h4 mb-1">監査ログ</h1>
            <p class="text-secondary small mb-0">認証・設定変更・ジョブ操作の監査ログを表示します。</p>
          </div>
          <div class="d-flex gap-2 align-items-center">
            <select id="auditLimit" class="form-select form-select-sm" style="width: 9rem;">
              <option value="100">100件</option>
              <option value="200" selected>200件</option>
              <option value="500">500件</option>
              <option value="1000">1000件</option>
            </select>
            <button id="reloadAuditBtn" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-clockwise"></i> 更新</button>
          </div>
        </div>

        <div id="alertBox" class="alert d-none"></div>

        <div class="card border-0 shadow-sm">
          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>時刻</th>
                  <th>実行者</th>
                  <th>Action</th>
                  <th>対象種別</th>
                  <th>対象ID</th>
                  <th>詳細</th>
                </tr>
              </thead>
              <tbody id="auditBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMobile">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">NOC Streaming</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <nav class="nav flex-column" id="sidebarMobileNav">
        <a class="nav-link" data-page="jobs" href="/ui/jobs.html"><i class="bi bi-broadcast me-2"></i>ジョブ管理</a>
        <a class="nav-link admin-only" data-page="users" href="/ui/users.html"><i class="bi bi-people me-2"></i>ユーザー管理</a>
        <a class="nav-link admin-only" data-page="ldap" href="/ui/ldap.html"><i class="bi bi-diagram-3 me-2"></i>LDAP設定</a>
        <a class="nav-link admin-only" data-page="audit" href="/ui/audit.html"><i class="bi bi-clipboard-data me-2"></i>監査ログ</a>
      </nav>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
