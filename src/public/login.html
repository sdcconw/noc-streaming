<!doctype html>
<html lang="ja" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDCC ONWv4 Monitor Streaming</title>
  <script src="/ui/runtime-config.js"></script>
  <script src="./bootstrap-css-loader.js"></script>
  <link href="./styles.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-5">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h1 class="h4 mb-3">SDCC ONWv4 Monitor Streaming</h1>
            <p class="text-secondary small">管理画面へログインしてください。</p>
            <form id="loginForm" class="vstack gap-3">
              <div>
                <label for="username" class="form-label">ユーザー名</label>
                <input id="username" class="form-control" required />
              </div>
              <div>
                <label for="password" class="form-label">パスワード</label>
                <input id="password" type="password" class="form-control" required />
              </div>
              <button class="btn btn-primary" type="submit">ログイン</button>
            </form>
            <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="./login.js"></script>
</body>
</html>
