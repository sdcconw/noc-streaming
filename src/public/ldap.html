<!doctype html>
<html lang="ja" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOC Streaming - LDAP設定</title>
  <script src="/ui/runtime-config.js"></script>
  <script src="./bootstrap-css-loader.js"></script>
  <link href="./styles.css" rel="stylesheet" />
</head>
<body data-page="ldap">
  <div class="app-shell">
    <aside class="sidebar d-none d-lg-flex flex-column">
      <div class="sidebar-header px-3 py-3 border-bottom"><span class="fw-semibold">NOC Streaming</span></div>
      <nav class="nav flex-column p-2" id="sidebarNav">
        <a class="nav-link" data-page="jobs" href="/ui/jobs.html"><i class="bi bi-broadcast me-2"></i>ジョブ管理</a>
        <a class="nav-link admin-only" data-page="users" href="/ui/users.html"><i class="bi bi-people me-2"></i>ユーザー管理</a>
        <a class="nav-link admin-only" data-page="ldap" href="/ui/ldap.html"><i class="bi bi-diagram-3 me-2"></i>LDAP設定</a>
        <a class="nav-link admin-only" data-page="audit" href="/ui/audit.html"><i class="bi bi-clipboard-data me-2"></i>監査ログ</a>
      </nav>
    </aside>
    <div class="content-wrap">
      <nav class="navbar navbar-expand-lg border-bottom bg-body sticky-top">
        <div class="container-fluid px-3 px-md-4">
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-secondary d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMobile"><i class="bi bi-list"></i></button>
            <a class="navbar-brand fw-semibold mb-0" href="/ui/jobs.html">NOC Streaming</a>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button id="themeToggle" class="btn btn-outline-secondary btn-sm" title="ダークモード切替"><i class="bi bi-moon-fill"></i></button>
            <span id="userBadge" class="badge text-bg-secondary"></span>
            <button id="logoutBtn" class="btn btn-outline-danger btn-sm">ログアウト</button>
          </div>
        </div>
      </nav>
      <main class="container-fluid px-3 px-md-4 py-3">
        <h1 class="h4 mb-1">LDAP設定</h1>
        <p class="text-secondary small mb-3">LDAP接続情報とログイン許可グループを管理します。</p>
        <div id="alertBox" class="alert d-none"></div>

        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <form id="ldapForm" class="row g-3">
              <div class="col-12 form-check ms-1">
                <input id="ldapEnabled" name="enabled" class="form-check-input" type="checkbox" />
                <label class="form-check-label" for="ldapEnabled">有効化</label>
              </div>
              <div class="col-12">
                <label class="form-label">LDAPサーバーアドレス：入力欄</label>
                <input name="server_url" class="form-control" placeholder="ldaps://ldap.example.local:636" required />
              </div>
              <div class="col-12">
                <label class="form-label">ユーザー名（Bind DN）：入力欄</label>
                <input name="bind_dn" class="form-control" placeholder="cn=admin,dc=example,dc=local" required />
              </div>
              <div class="col-12">
                <label class="form-label">パスワード（Bind Password）：入力欄</label>
                <input name="bind_password" type="password" class="form-control" placeholder="変更する場合のみ入力" />
                <div class="form-text">未入力の場合は既存のパスワード設定を維持します。</div>
              </div>
              <div class="col-12">
                <label class="form-label">ベースDN（Base DN）：入力欄</label>
                <input name="base_dn" class="form-control" placeholder="dc=example,dc=local" required />
              </div>
              <div class="col-12">
                <label class="form-label">ユーザーフィルター（User Filter）：入力欄</label>
                <input name="user_filter" class="form-control" placeholder="(uid={username})" required />
              </div>
              <div class="col-12">
                <label class="form-label">許可グループDN（Group DN）：入力欄</label>
                <input name="group_dn" class="form-control" placeholder="cn=noc-admins,ou=groups,dc=example,dc=local" />
              </div>
              <div class="col-12 d-flex gap-2">
                <button class="btn btn-outline-primary btn-sm" type="submit">LDAP設定保存</button>
                <button id="ldapTestBtn" class="btn btn-outline-secondary btn-sm" type="button">接続確認</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMobile">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">NOC Streaming</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <nav class="nav flex-column" id="sidebarMobileNav">
        <a class="nav-link" data-page="jobs" href="/ui/jobs.html"><i class="bi bi-broadcast me-2"></i>ジョブ管理</a>
        <a class="nav-link admin-only" data-page="users" href="/ui/users.html"><i class="bi bi-people me-2"></i>ユーザー管理</a>
        <a class="nav-link admin-only" data-page="ldap" href="/ui/ldap.html"><i class="bi bi-diagram-3 me-2"></i>LDAP設定</a>
        <a class="nav-link admin-only" data-page="audit" href="/ui/audit.html"><i class="bi bi-clipboard-data me-2"></i>監査ログ</a>
      </nav>
    </div>
  </div>

  <script src="./bootstrap-js-loader.js"></script>
  <script src="./app.js"></script>
</body>
</html>
